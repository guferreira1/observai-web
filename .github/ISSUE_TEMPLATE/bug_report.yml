name: Bug report
description: Report a reproducible problem in ObservAI Web.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include provider tokens, LLM API keys, credentials, private logs or sensitive evidence.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The dashboard shows API unavailable even though the API health endpoint is healthy.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Start ObservAI API at http://localhost:8080
        2. Run pnpm run dev
        3. Open http://localhost:3000
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, commit SHA or container image tag.
      placeholder: 0.1.0, v0.1.0 or commit SHA
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - New analysis
        - Analysis detail
        - Evidence viewer
        - Trace insights
        - AI chat
        - History
        - API proxy
        - Build or deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, Node.js, pnpm, OS and relevant non-secret environment values.
      placeholder: |
        Browser:
        Node.js:
        pnpm:
        OS:
        NEXT_PUBLIC_OBSERVAI_API_URL:
        OBSERVAI_API_URL:
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only redacted logs or screenshots.
      render: shell
