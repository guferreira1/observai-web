name: Web CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish. Example: v0.1.0
        required: true
        type: string
      publish_latest:
        description: Also publish the latest tag
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: web-cd-${{ github.ref_name }}-${{ github.event.inputs.image_tag || 'tag' }}
  cancel-in-progress: false

env:
  IMAGE_NAME: observai/observai-web

jobs:
  publish:
    name: Build and publish Web image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        shell: bash
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        if: steps.detect.outputs.dockerfile == 'true'
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$IMAGE_TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid image tag. Use semantic versioning, for example: v0.1.0 or 0.1.0-alpha.1"
            exit 1
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set Docker tags
        if: steps.detect.outputs.dockerfile == 'true'
        id: tags
        shell: bash
        run: |
          TAGS="${IMAGE_NAME}:${{ steps.version.outputs.image_tag }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            TAGS="$TAGS,${IMAGE_NAME}:latest"
          elif [ "${{ github.event.inputs.publish_latest }}" = "true" ]; then
            TAGS="$TAGS,${IMAGE_NAME}:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.detect.outputs.dockerfile == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.detect.outputs.dockerfile == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.detect.outputs.dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_OBSERVAI_API_URL=${{ vars.NEXT_PUBLIC_OBSERVAI_API_URL || '/api/observai' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip Docker build
        if: steps.detect.outputs.dockerfile == 'false'
        run: echo "Dockerfile not found yet. Skipping image build until the project is initialized."
