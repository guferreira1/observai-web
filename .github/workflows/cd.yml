name: Web CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish. Example: v0.1.0
        required: true
        type: string
      publish_latest:
        description: Also publish the latest tag
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: web-cd-${{ github.event.inputs.image_tag }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/observai-web

jobs:
  publish:
    name: Build and publish Web image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        shell: bash
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate image tag
        if: steps.detect.outputs.dockerfile == 'true'
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.image_tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid image_tag. Use semantic versioning, for example: v0.1.0 or 0.1.0-alpha.1"
            exit 1
          fi

      - name: Set Docker tags
        if: steps.detect.outputs.dockerfile == 'true'
        id: tags
        shell: bash
        run: |
          TAGS="${IMAGE_NAME}:${{ github.event.inputs.image_tag }}"
          if [ "${{ github.event.inputs.publish_latest }}" = "true" ]; then
            TAGS="$TAGS,${IMAGE_NAME}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.detect.outputs.dockerfile == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.detect.outputs.dockerfile == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.detect.outputs.dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_OBSERVAI_API_URL=${{ vars.NEXT_PUBLIC_OBSERVAI_API_URL || 'http://localhost:8080' }}

      - name: Skip Docker build
        if: steps.detect.outputs.dockerfile == 'false'
        run: echo "Dockerfile not found yet. Skipping image build until the project is initialized."
