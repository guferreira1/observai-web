name: Web CD

"on":
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to publish. Example: v0.1.0"
        required: true
        type: string
      publish_latest:
        description: "Also publish the latest tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: web-cd-${{ inputs.image_tag }}
  cancel-in-progress: false

env:
  IMAGE_NAME: observai/observai-web

jobs:
  publish:
    name: Build and publish Web image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate image tag
        shell: bash
        run: |
          if [[ ! "${{ inputs.image_tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid image tag. Use semantic versioning, for example: v0.1.0 or 0.1.0-alpha.1"
            exit 1
          fi

      - name: Set Docker tags
        id: tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${{ inputs.image_tag }}"
            if [ "${{ inputs.publish_latest }}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set frontend API URL
        id: frontend_api_url
        shell: bash
        run: |
          if [ -n "${{ vars.NEXT_PUBLIC_OBSERVAI_API_URL }}" ]; then
            echo "value=${{ vars.NEXT_PUBLIC_OBSERVAI_API_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/api/observai" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_OBSERVAI_API_URL=${{ steps.frontend_api_url.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
