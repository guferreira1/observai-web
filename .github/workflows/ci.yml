name: Web CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Next.js project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "node_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "node_project=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.detect.outputs.node_project == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        if: steps.detect.outputs.node_project == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.node_project == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect.outputs.node_project == 'true'
        run: pnpm run lint

      - name: Type check
        if: steps.detect.outputs.node_project == 'true'
        run: pnpm run typecheck

      - name: Test
        if: steps.detect.outputs.node_project == 'true'
        run: pnpm test

      - name: Build
        if: steps.detect.outputs.node_project == 'true'
        run: pnpm run build

      - name: Skip validation
        if: steps.detect.outputs.node_project == 'false'
        run: echo "package.json not found yet. Skipping Node validation until the project is initialized."
